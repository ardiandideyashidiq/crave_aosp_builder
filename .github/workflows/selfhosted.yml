name: Crave Builder(self-hosted)
on:
  workflow_dispatch:
    # Various inputs to simplify usage of workflow.
    inputs:
      BASE_PROJECT:
        description: 'Choose a base project:'
        required: true
        default: 'LineageOS 21.0'
        type: choice
        options:
          - 'LineageOS 20.0'
          - 'LineageOS 21.0'
          - 'LineageOS 22.1'
          - 'ArrowOS 13.1'
          - 'DerpFest 14.0'
          - 'CipherOS 14'
          - 'PixelOS 15'
          - 'RisingOS 15 Revived'
          - 'LineageOS 18.1'
          - 'LineageOS 16.0'
          - 'CyanogenMOD 14.1'
          - 'AOSP'
      BUILD_DIFFERENT_ROM:
        description: "Command to initialize a different 'repo' project:"
        required: false
        default: "echo 'Build Starting!'"
      REMOVALS:
        description: "Folders to be removed before syncing:"
        required: false
      LOCAL_MANIFEST:
        description: "Personal local manifest [repository or raw]:"
        required: true
        default: 'https://github.com/sounddrill31/local_manifests_oxygen'
      LOCAL_MANIFEST_BRANCH:
        description: "Personal local manifest's branch:"
        required: false
        default: 'lineage-21-qpr3'
      DEVICE_NAME:
        description: "Device's codename:"
        required: true
        default: "oxygen"
      PRODUCT_NAME:
        description: "Product to build:"
        required: true
        default: "oxygen"
      BUILD_COMMAND:
        description: 'Command to be used for compiling:'
        required: true
        default: 'mka bacon'
      BUILD_TYPE:
        description: 'Type of build:'
        required: true
        default: 'userdebug'
        type: choice
        options: 
        - 'eng'
        - 'userdebug'
        - 'user' 
      CLEAN_BUILD:
        description: 'Build with a clean workspace?'
        required: true
        default: 'no'
        type: choice
        options: 
        - 'yes'
        - 'no'

jobs:
  Start-Runner:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up environment
      run: |
        sudo apt-get update
        sudo apt-get install -y tmux

      # Download and configure 'crave'.
    - name: Configure the 'crave' environment
      run: |
        echo "DCDEVSPACE status: ${DCDEVSPACE}"
        if [[ $DCDEVSPACE == *1* ]]; then
        echo 'No need to set up crave, we are already running in devspace!'
        else
          mkdir ${HOME}/bin/
          curl -s https://raw.githubusercontent.com/accupara/crave/master/get_crave.sh | bash -s --
          mv ${PWD}/crave ${HOME}/bin/
          sudo ln -sf /home/${USER}/bin/crave /usr/bin/crave
          envsubst < ${PWD}/crave.conf.sample >> ${PWD}/crave.conf
          rm -rf ${PWD}/crave.conf.sample          
        fi
      env:
        CRAVE_USERNAME: ${{  secrets.CRAVE_USERNAME  }}
        CRAVE_TOKEN: ${{  secrets.CRAVE_TOKEN  }}

    - name: Run crave devspace
      run: |
        crave ${{ secrets.CRAVE_FLAGS }} devspace -- "echo "Looking for runner..."
          # Look for whether there's a runner folder set up
          if [ -f actions-runner/run.sh ] ; then
            echo "Runner found! Restarting it..."
          else
            echo "Error! Runner not found!"
            exit 1
          fi

        if tmux has-session -t ghactions; then 
          echo "Runner is already Running" 
        else 
          tmux kill-session -t ghactions;
          tmux new-session -d -s ghactions 
          tmux send-keys -t ghactions './actions-runner/run.sh' Enter 
          echo "Runner Started"
        fi "
  prepare:
    name: Prepare for Building
    runs-on: ubuntu-latest
    steps:
    - name: Check-out to repository
      uses: actions/checkout@v4

    - name: Check Credentials
      run: |
        if [[ -z "${{ secrets.CRAVE_TOKEN }}" || -z "${{ secrets.CRAVE_USERNAME }}" ]]; then
          echo "Crave Credentials Not Configured! Exiting..."
          exit 1
        fi
        bash scripts/env-checker.sh

    - name: Set Project variables
      id: proj-variables
      run: |
        case "${{ github.event.inputs.BASE_PROJECT }}" in
        "ArrowOS 13.1")
          export PROJECTFOLDER="/crave-devspaces/Arrow13"
          export PROJECTID="73"
          export REPO_INIT="repo init -u https://github.com/ArrowOS/android_manifest.git -b arrow-13.1 --depth=1"
        ;;
        "DerpFest 14.0")
          export PROJECTFOLDER="/crave-devspaces/DerpFest14"
          export PROJECTID="64"
          export REPO_INIT="repo init -u https://github.com/DerpFest-AOSP/manifest.git -b 14 --depth=1"
        ;;
        "LineageOS 21.0")
          export PROJECTFOLDER="/crave-devspaces/Lineage21"
          export PROJECTID="72"
          export REPO_INIT="repo init -u https://github.com/LineageOS/android.git -b lineage-21.0 --git-lfs --depth=1"
        ;;
        "LineageOS 22.1")
          export PROJECTFOLDER="/crave-devspaces/Lineage22"
          export PROJECTID="93"
          export REPO_INIT="repo init -u https://github.com/accupara/los22.git -b lineage-22.1 --git-lfs --depth=1"
        ;;
        "LineageOS 20.0")
          export PROJECTFOLDER="/crave-devspaces/Lineage20"
          export PROJECTID="36"
          export REPO_INIT="repo init -u https://github.com/accupara/los20.git -b lineage-20.0 --git-lfs --depth=1"
        ;;
        "CipherOS 14")
          export PROJECTFOLDER="/crave-devspaces/Cipher14"
          export PROJECTID="79"
          export REPO_INIT="repo init -u https://github.com/CipherOS/android_manifest.git -b fourteen --git-lfs --depth=1"
        ;;
        "PixelOS 15")
          export PROJECTFOLDER="/crave-devspaces/Pixel15"
          export PROJECTID="82"
          export REPO_INIT="repo init -u https://github.com/PixelOS-AOSP/manifest.git -b fifteen --git-lfs --depth=1"
        ;;
        "RisingOS 15 Revived")
          export PROJECTFOLDER="/crave-devspaces/Rising15"
          export PROJECTID="86"
          export REPO_INIT="repo init -u https://github.com/RisingOS-Revived/android.git -b fifteen --git-lfs --depth=1"
        ;;
        "LineageOS 18.1")
          export PROJECTFOLDER="/crave-devspaces/Lineage18"
          export PROJECTID="85"
          export REPO_INIT="repo init -u https://github.com/accupara/los18.1.git -b lineage-18.1 --git-lfs --depth=1"
        ;;
        "LineageOS 16.0")
          export PROJECTFOLDER="/crave-devspaces/Lineage16"
          export PROJECTID="81"
          export REPO_INIT="repo init -u https://github.com/accupara/los16.git -b lineage-16.0 --git-lfs --depth=1"
        ;;
        "CyanogenMOD 14.1")
          export PROJECTFOLDER="/crave-devspaces/Cyanogen14"
          export PROJECTID="83"
          export REPO_INIT="repo init -u https://github.com/accupara/los-cm14.1.git -b cm-14.1 --git-lfs --depth=1"
        ;;
        "AOSP")
          export PROJECTFOLDER="/crave-devspaces/AOSP"
          export PROJECTID="35"
          export REPO_INIT="repo init -u https://android.googlesource.com/platform/manifest.git -b master --git-lfs --depth=1"
        ;;
        esac

        if [[ ${{ github.event.inputs.PRODUCT_NAME }} == *_* ]] && [[ ${{ github.event.inputs.PRODUCT_NAME }} != gsi_* ]] && [[ ${{ github.event.inputs.PRODUCT_NAME }} != sdk_* ]] && [[ ${{ github.event.inputs.PRODUCT_NAME }} != *_sprout ]] && [[ ${{ github.event.inputs.PRODUCT_NAME }} != Mi439_* ]] && [[ ${{ github.event.inputs.PRODUCT_NAME }} != Mi8937_* ]]; then
          LUNCH="lunch ${{ github.event.inputs.PRODUCT_NAME }}-${{ github.event.inputs.BUILD_TYPE }}"
        elif [[ "${{ github.event.inputs.BASE_PROJECT }}" == "RisingOS 15 Revived" ]] && [[ "${{ github.event.inputs.BUILD_DIFFERENT_ROM }}" == "echo 'Build Starting!'" ]]; then
            LUNCH="riseup ${{ github.event.inputs.PRODUCT_NAME }} ${{ github.event.inputs.BUILD_TYPE }}"
        else
            LUNCH="breakfast ${{ github.event.inputs.PRODUCT_NAME }} ${{ github.event.inputs.BUILD_TYPE }}"
        fi

          if [[ "${{ github.event.inputs.LOCAL_MANIFEST }}" =~ \.xml(/)?$ ]]; then
            local_manifest_url="${{ github.event.inputs.LOCAL_MANIFEST }}"
            export local_manifest_url="${local_manifest_url%/}"  # remove trailing slash if it exists
            LOCAL_MANIFEST="mkdir -p .repo/local_manifests && rm -rf .repo/local_manifests/* || true && curl -o .repo/local_manifests/local_manifest.xml ${local_manifest_url}"
          else
            export LOCAL_MANIFEST="git clone ${{ github.event.inputs.LOCAL_MANIFEST }} --depth 1 -b ${{github.event.inputs.LOCAL_MANIFEST_BRANCH}} .repo/local_manifests"
          fi

        echo "Building on ${{ github.event.inputs.BASE_PROJECT }} project"
        echo "PROJECTFOLDER=$PROJECTFOLDER" >> "$GITHUB_OUTPUT"
        echo "PROJECTID=$PROJECTID"  >> "$GITHUB_OUTPUT"
        echo "REPO_INIT=$REPO_INIT" >> "$GITHUB_OUTPUT"
        echo "LUNCH=$LUNCH" >> "$GITHUB_ENV"
        echo "LUNCH=$LUNCH" >> "$GITHUB_OUTPUT"
        echo "LOCAL_MANIFEST=$LOCAL_MANIFEST" >> "$GITHUB_ENV"
        echo "LOCAL_MANIFEST=$LOCAL_MANIFEST" >> "$GITHUB_OUTPUT"

    - name: Display Run Parameters # Credit to azwhikaru for this part
      run: |
        echo "::group::User Environment Variables"
        echo "Base Project: ${{ github.event.inputs.BASE_PROJECT }}"
        echo "Extra Repo Init: ${{ github.event.inputs.BUILD_DIFFERENT_ROM }}"
        echo "Removals: ${{ github.event.inputs.REMOVALS }}"
        echo "Local Manifest: ${{ github.event.inputs.LOCAL_MANIFEST }}"
        echo "Local Manifest Branch: ${{ github.event.inputs.LOCAL_MANIFEST_BRANCH }}"
        echo "Device Name: ${{ github.event.inputs.DEVICE_NAME }}"
        echo "Breakfast/Lunch Target: ${{ env.LUNCH }}"
        echo "Build Command: ${{ github.event.inputs.BUILD_COMMAND }}"
        echo "Clean Build: ${{ github.event.inputs.CLEAN_BUILD }}"
        echo "::endgroup::"

        echo "Displaying Local Manifests"
        if [[ -z "${{ secrets.DISPLAY_FALSE }}" ]]; then
          bash -c "$LOCAL_MANIFEST"
          cat .repo/local_manifests/*.xml
        else
          echo "Displaying is disabled through secrets."
        fi
    outputs:
      PROJECTFOLDER: ${{ steps.proj-variables.outputs.PROJECTFOLDER }}
      PROJECTID: ${{ steps.proj-variables.outputs.PROJECTID }}
      REPO_INIT: ${{ steps.proj-variables.outputs.REPO_INIT }}
      LUNCH: ${{ steps.proj-variables.outputs.LUNCH }}
      LOCAL_MANIFEST: ${{ steps.proj-variables.outputs.LOCAL_MANIFEST }}

  test:
    name: Test Local Manifests
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      # Accept Project Variables
    - name: Set Repo Project
      run: |
        PROJECTFOLDER="${{ needs.prepare.outputs.PROJECTFOLDER }}"
        PROJECTID="${{ needs.prepare.outputs.PROJECTID }}"
        REPO_INIT="${{ needs.prepare.outputs.REPO_INIT }}"
        LUNCH="${{ needs.prepare.outputs.LUNCH }}"
        LOCAL_MANIFEST="${{ needs.prepare.outputs.LOCAL_MANIFEST }}"

        echo "PROJECTFOLDER=$PROJECTFOLDER" >> "$GITHUB_ENV"
        echo "PROJECTID=$PROJECTID"  >> "$GITHUB_ENV"
        echo "REPO_INIT=$REPO_INIT" >> "$GITHUB_ENV"
        echo "LUNCH=$LUNCH" >> "$GITHUB_ENV"
        echo "LOCAL_MANIFEST=$LOCAL_MANIFEST" >> "$GITHUB_ENV"

      # Download and configure 'repo'.
    - name: Configure the 'repo' environment
      run: |
        # Check if repo is already installed
        if ! command -v repo >/dev/null 2>&1; then
          echo "Repo not found. Installing now..."
          # Create bin directory if it doesn't exist
          mkdir -p ~/bin
          # Download repo script
          curl https://storage.googleapis.com/git-repo-downloads/repo >> ~/bin/repo
          # Make repo script executable
          chmod a+x ~/bin/repo
          # Create symbolic link to /usr/bin/repo
          sudo ln -sf "/home/$(whoami)/bin/repo" "/usr/bin/repo"
          echo "Repo installation complete."
        else
          echo "Repo already installed."
        fi
      continue-on-error: true
      
      # Generate 'git' credential in base of the workflow's author.
    - name: Set-up 'git' credential(s)
      run: |
        git config --global user.name "${{ github.actor }}"
        git config --global user.email "${{ github.actor_id }}+${{ github.actor }}@users.noreply.github.com"

      # Test Your Personal 'Local Manifests' against The ROM
    - name: Test Local Manifests
      if: ${{ github.event.inputs.BUILD_DIFFERENT_ROM != 'skip' }}
      run: |
        rm -rf tester
        mkdir tester
        cd tester 
        if [ "${{ github.event.inputs.BUILD_DIFFERENT_ROM }}" == "echo 'Build Starting!'" ]; then
          $REPO_INIT
        else
          ${{ github.event.inputs.BUILD_DIFFERENT_ROM }}
        fi 

        bash -c "$LOCAL_MANIFEST"

        timeout 1m repo sync --force-sync || { exit_code=$?; [ $exit_code -eq 124 ] || (echo "Error: Process failed with exit code $exit_code"; exit $exit_code); }
        du -csh . # Output Size when done
        rm -rf .repo
      timeout-minutes: 10
    outputs:
      PROJECTFOLDER: ${{ needs.prepare.outputs.PROJECTFOLDER }}
      PROJECTID: ${{ needs.prepare.outputs.PROJECTID }}
      REPO_INIT: ${{ needs.prepare.outputs.REPO_INIT }}
      LUNCH: ${{ needs.prepare.outputs.LUNCH }}
      LOCAL_MANIFEST: "${{ needs.prepare.outputs.LOCAL_MANIFEST }}"

  build:
    timeout-minutes: 1440
    name: Build using foss.crave.io
    needs: test
    runs-on: self-hosted
    concurrency:
      group: ${{ github.repository_owner }}
    steps:
      # Accept Project Variables
    - name: Set Repo Project
      run: |
        PROJECTFOLDER="${{ needs.test.outputs.PROJECTFOLDER }}"
        PROJECTID="${{ needs.test.outputs.PROJECTID }}"
        REPO_INIT="${{ needs.test.outputs.REPO_INIT }}"
        LUNCH="${{ needs.test.outputs.LUNCH }}"
        LOCAL_MANIFEST="${{ needs.test.outputs.LOCAL_MANIFEST }}"

        echo "PROJECTFOLDER=$PROJECTFOLDER" >> "$GITHUB_ENV"
        echo "PROJECTID=$PROJECTID"  >> "$GITHUB_ENV"
        echo "REPO_INIT=$REPO_INIT" >> "$GITHUB_ENV"
        echo "LUNCH=$LUNCH" >> "$GITHUB_ENV"
        echo "LOCAL_MANIFEST=$LOCAL_MANIFEST" >> "$GITHUB_ENV"

      # Send Build 'start' notification
    - name: Telegram Notification
      continue-on-error: true
      run: |
        send_telegram_message() {
          local message="$1"
          curl -s -X POST \
          https://api.telegram.org/bot$botToken/sendMessage \
          -d chat_id=$chatId \
          -d text="$message" \
          -d parse_mode="Markdown"
        }
        
        send_telegram_message "Crave Project: ${{ github.event.inputs.BASE_PROJECT }}%0ACrave ProjectID: $PROJECTID %0ABuild for ${{ github.event.inputs.DEVICE_NAME }} has been queued %0ACheck Progress at: %0Ahttps://github.com/$(echo "${{ github.repository }}" | sed 's@_@\\_@g')/actions/runs/${{ github.run_id }}"
      env:
        chatId: ${{ secrets.TELEGRAM_TO }}
        botToken: ${{ secrets.TELEGRAM_TOKEN }}
        jobStatus: "Build Started"
        skipSuccess: false

    - name: Cleanup
      run: rm -rf * # This cleans github actions workspace

    - name: Check for a broken .bashrc
      continue-on-error: true
      run: |
        (
          set +e
          output=$(source ~/.bashrc 2>&1)
          status=$?
          echo "$output"
          if [[ $status -ne 0 ]]; then
            echo "You have a broken .bashrc, please contact a Crave.io Administrator"
            exit 1
          else
            echo ".bashrc looks okay, no explicit errors"
          fi

          # Double check to be sure
          if echo "$output" | grep -q "cannot execute"; then
            echo "You have a broken .bashrc, please contact a Crave.io Administrator"
            exit 1
          fi
        )

        # Create a project folder
    - name: Create Project Folders
      run: |
        echo "DCDEVSPACE status: ${DCDEVSPACE}"
        if [[ $DCDEVSPACE != *1* ]]; then

          #curl -s https://raw.githubusercontent.com/accupara/crave/master/get_crave.sh | bash -s -- 

          #mkdir -p ${HOME}/bin/
          #mv ${PWD}/crave ${HOME}/bin/ 
          #sudo ln -sf /home/${USER}/bin/crave /usr/bin/crave; sudo chmod +x /usr/bin/crave 

          echo "Symlinking devspace folder"
          mkdir -p devspace
          sudo mkdir -p /crave-devspaces
          sudo ln -sf ${pwd}/devspace /crave-devspaces
          sudo chmod 777 /crave-devspaces
        else
          echo "We are already running in devspace... Skipping Symlinks"
        fi
        if grep -q "$PROJECTFOLDER" <(crave clone list --json | jq -r '.clones[]."Cloned At"') || [[ "${DCDEVSPACE}" == "1" ]]; then
          crave clone destroy -y $PROJECTFOLDER || echo "Error removing $PROJECTFOLDER"
        else          
        echo "Skipping removal"
        fi

        if [[ $DCDEVSPACE == *1* ]]; then
          crave clone create --projectID $PROJECTID $PROJECTFOLDER || echo "Crave clone create failed!"
        else
          mkdir -p $PROJECTFOLDER
        fi
        
      # Check-out in order to access the repository's files.
    - name: Check-out to repository
      uses: actions/checkout@v4

      # Set-up a spearate directory for the device.
    - name: Set-up workspace environment
      run: |
        cd $PROJECTFOLDER
        mkdir ${{ github.event.inputs.DEVICE_NAME }}
        cd ${{ github.event.inputs.DEVICE_NAME }}
      continue-on-error: true
      
      # Generate 'git' credential in base of the workflow's author.
    - name: Set-up 'git' credential(s)
      run: |
        git config --global user.name "${{ github.actor }}"
        git config --global user.email "${{ github.actor_id }}+${{ github.actor }}@users.noreply.github.com"
      
      # Download and configure 'crave'.
    - name: Configure the 'crave' environment
      run: |
        echo "DCDEVSPACE status: ${DCDEVSPACE}"
        mkdir -p $PROJECTFOLDER/.repo/manifests
        if [[ $DCDEVSPACE == *1* ]]; then
        echo 'No need to set up crave, we are already running in devspace!'
        else
          curl -s https://raw.githubusercontent.com/accupara/crave/master/get_crave.sh | bash -s --
          mv ${PWD}/crave ${HOME}/bin/
          sudo ln -sf /home/${USER}/bin/crave /usr/bin/crave
          envsubst < ${PWD}/crave.conf.sample >> ${PWD}/crave.conf
          rm -rf ${PWD}/crave.conf.sample       
          cp crave.conf $PROJECTFOLDER 
        fi
        if [[ -z "${{ secrets.CUSTOM_YAML }}" ]]; then
          cp configs/crave/crave.yaml.aosp $PROJECTFOLDER/.repo/manifests/crave.yaml
          echo "No Custom Configuration Found, Using Template!"
        else
          touch $PROJECTFOLDER/.repo/manifests/crave.yaml || true
          echo "${{ secrets.CUSTOM_YAML }}" > $PROJECTFOLDER/.repo/manifests/crave.yaml
          echo "Custom Configuration Found!"
        fi
      env:
        CRAVE_USERNAME: ${{  secrets.CRAVE_USERNAME  }}
        CRAVE_TOKEN: ${{  secrets.CRAVE_TOKEN  }}

      # Initialize the previously choosen 'repo' project.
    - name: Set the 'crave' project
      run: |
        cd $PROJECTFOLDER
        if grep -q "$PROJECTFOLDER" <(crave clone list --json | jq -r '.clones[]."Cloned At"') || [[ "${DCDEVSPACE}" == "1" ]]; then
          echo "Using Crave Clone... skipping"
        else
          echo "Running $REPO_INIT"
          $REPO_INIT
        fi

        if [ "${{ github.event.inputs.BUILD_DIFFERENT_ROM }}" == "echo 'Build Starting!'" ]; then
          export BUILD_DIFFERENT_ROM="$REPO_INIT"
          echo "Building $BUILD_DIFFERENT_ROM"
        else
          export BUILD_DIFFERENT_ROM="${{ github.event.inputs.BUILD_DIFFERENT_ROM }}"
          echo "Building $BUILD_DIFFERENT_ROM"
        fi
        echo "BUILD_DIFFERENT_ROM=$BUILD_DIFFERENT_ROM" >> "$GITHUB_ENV"
        echo "We will be building with $LUNCH"

      # Create a 'crave' job for building.
    - name: Start compilation through 'crave'
      if: ${{ github.event.inputs.BUILD_DIFFERENT_ROM != 'skip' }}
      run: |
        cd $PROJECTFOLDER
        
        jq '.projects = []' ~/crave.conf > tmp && mv tmp ~/crave.conf
        if [ "${{ github.event.inputs.CLEAN_BUILD }}" == "yes" ]; then
           export CLEAN="--clean"
        fi

        if [[ -n "${{ secrets.PAID }}" ]]; then
           echo "Paid Build... Tokens will be consumed."
           export PAID="--platform aosp-silver"
        fi

        echo "Build is queued! Please wait for your build to start."
        echo "Check foss.crave.io Dashboard to see builds"
        echo "Running build's log will show up here!"


        crave ${{ secrets.CRAVE_FLAGS }} run --no-patch ${PAID} ${CLEAN} -- "rm -rf .repo/local_manifests/ ${{ github.event.inputs.REMOVALS }} && \
        # Clone local_manifests repository
        $BUILD_DIFFERENT_ROM ; \
        $LOCAL_MANIFEST && \

        # Sync the repositories
        if [ -f /usr/bin/resync ]; then
          /usr/bin/resync # For compatibility with Omansh's Docker image 
        else
          /opt/crave/resync.sh
        fi && \

        # Set up build environment
        export BUILD_USERNAME=${{ github.actor }} ; \
        export BUILD_HOSTNAME=crave ; \
        source build/envsetup.sh && \

        echo "Repository: ${{ github.repository }}"; \
        echo "Run ID: ${{ github.run_id }}"; \

        # Build the ROM
        $LUNCH && \
        make installclean && \
        ${{ github.event.inputs.BUILD_COMMAND }}"
      timeout-minutes: 1440

      # Send Build 'status' notification (Success)
    - name: Telegram Notification
      if:  ${{ success() }}
      continue-on-error: true
      run: |
        send_telegram_message() {
          local message="$1"
          curl -s -X POST \
          https://api.telegram.org/bot$botToken/sendMessage \
          -d chat_id=$chatId \
          -d text="$message" \
          -d parse_mode="Markdown"
        }

        send_telegram_message "Crave Project: ${{ github.event.inputs.BASE_PROJECT }}%0ACrave ProjectID: $PROJECTID %0ABuild for ${{ github.event.inputs.DEVICE_NAME }} has Succeeded!%0AUploading artifacts and mirrors now...%0ACheck Progress at: %0Ahttps://github.com/$(echo "${{ github.repository }}" | sed 's@_@\\_@g')/actions/runs/${{ github.run_id }}"

      env:
        chatId: ${{ secrets.TELEGRAM_TO }}
        botToken: ${{ secrets.TELEGRAM_TOKEN }}
        jobStatus: ${{ job.status }}
        skipSuccess: false

      # Send Build 'status' notification (Fail/Cancel)
    - name: Telegram Notification
      if:  ${{ cancelled() || failure() }}
      continue-on-error: true
      run: |
        send_telegram_message() {
          local message="$1"
          curl -s -X POST \
          https://api.telegram.org/bot$botToken/sendMessage \
          -d chat_id=$chatId \
          -d text="$message" \
          -d parse_mode="Markdown"
        }

        if [ "$jobStatus" = "cancelled" ]; then
          jobMessage="has been Cancelled!"
        elif [ "$jobStatus" = "failure" ]; then
          jobMessage="has Failed!"
        fi

        send_telegram_message "Crave Project: ${{ github.event.inputs.BASE_PROJECT }}%0ACrave ProjectID: $PROJECTID %0ABuild for ${{ github.event.inputs.DEVICE_NAME }} $jobMessage %0ACheck Progress at: %0Ahttps://github.com/$(echo "${{ github.repository }}" | sed 's@_@\\_@g')/actions/runs/${{ github.run_id }}"
        # Todo: error.log link
      env:
        chatId: ${{ secrets.TELEGRAM_TO }}
        botToken: ${{ secrets.TELEGRAM_TOKEN }}
        jobStatus: ${{ job.status }}

      # Only reach this wheter the user killed the workflow.
    - name: Execute if the job is cancelled
      if: ${{ cancelled() }}
      run: |
        cd $PROJECTFOLDER
        crave stop --all

      # Upload '.zip's and '.img's directly from 'crave' ssh.
    - name: Upload build artifact(s)
      continue-on-error: true
      run: |
        cd $PROJECTFOLDER
        echo "${{ secrets.GITHUB_TOKEN }}" > token.txt
        crave push token.txt -d $(crave ssh -- pwd | grep -v Select | sed -s 's/\r//g')/
        crave ssh -- "export GH_UPLOAD_LIMIT="${{ secrets.GH_UPLOAD_LIMIT }}"; bash /opt/crave/github-actions/upload.sh '${{ github.run_id }}' '${{ github.event.inputs.DEVICE_NAME }}'  '${{ github.repository }}' '${{ github.event.inputs.PRODUCT_NAME }}-${{ github.run_id }}' '${{ secrets.EXTRA_FILES }}'"

      # Upload build artifact mirror(s) to external hosts and send final Telegram buttons.
    - name: Upload build mirror(s)
      if: ${{ success() }}
      continue-on-error: true
      run: |
        set +x
        cd $PROJECTFOLDER

        REMOTE_DIR="$(crave ssh -- pwd | grep -v Select | sed -s 's/\r//g')"

        cat > mirror-upload.env <<'EOF'
        export TELEGRAM_TO='${{ secrets.TELEGRAM_TO }}'
        export TELEGRAM_TOKEN='${{ secrets.TELEGRAM_TOKEN }}'
        export GOFILE_TOKEN='${{ secrets.GOFILE_TOKEN }}'
        export GOFILE_FOLDER_ID='${{ secrets.GOFILE_FOLDER_ID }}'
        export PIXELDRAIN_API_KEY='${{ secrets.PIXELDRAIN_API_KEY }}'
        export PIXELDRAIN_TOKEN='${{ secrets.PIXELDRAIN_TOKEN }}'
        export VIKINGFILE_USER_HASH='${{ secrets.VIKINGFILE_USER_HASH }}'
        export VIKINGFILE_HASH='${{ secrets.VIKINGFILE_HASH }}'
        export VIKINGFILE_PATH='${{ secrets.VIKINGFILE_PATH }}'
        export VIKINGFILE_PUBLIC_SHARE='${{ secrets.VIKINGFILE_PUBLIC_SHARE }}'
        export MIRROR_ARTIFACT_LIMIT='${{ secrets.MIRROR_ARTIFACT_LIMIT }}'
        EOF
        sed -i 's/^        //' mirror-upload.env
        chmod 600 mirror-upload.env

        cat > mirror-upload.sh <<'EOF'
        #!/usr/bin/env bash
        set -uo pipefail

        DEVICE_NAME="${1:?device name required}"
        REPOSITORY="${2:?repository required}"
        RUN_ID="${3:?run id required}"

        export TZ="${TZ:-Asia/Jakarta}"
        PIXELDRAIN_API_KEY="${PIXELDRAIN_API_KEY:-${PIXELDRAIN_TOKEN:-}}"
        VIKINGFILE_USER_HASH="${VIKINGFILE_USER_HASH:-${VIKINGFILE_HASH:-}}"
        MIRROR_ARTIFACT_LIMIT="${MIRROR_ARTIFACT_LIMIT:-1}"

        log() { printf '[mirror-upload] %s\n' "$*" >&2; }

        json_get() {
          local file="$1" expr="$2"
          python3 - "$file" "$expr" <<'PY'
        import json, sys
        path, expr = sys.argv[1], sys.argv[2]
        try:
            with open(path, 'r', encoding='utf-8') as fh:
                obj = json.load(fh)
            cur = obj
            for part in expr.split('.'):
                if not part:
                    continue
                if isinstance(cur, list):
                    cur = cur[int(part)]
                else:
                    cur = cur[part]
            if cur is None:
                sys.exit(1)
            if isinstance(cur, (dict, list)):
                print(json.dumps(cur, separators=(',', ':')))
            else:
                print(cur)
        except Exception:
            sys.exit(1)
        PY
        }

        json_first() {
          local file="$1"; shift
          local expr value
          for expr in "$@"; do
            value="$(json_get "$file" "$expr" 2>/dev/null || true)"
            if [[ -n "$value" && "$value" != "null" ]]; then
              printf '%s\n' "$value"
              return 0
            fi
          done
          return 1
        }

        url_encode() {
          python3 - "$1" <<'PY'
        import sys, urllib.parse
        print(urllib.parse.quote(sys.argv[1], safe=''))
        PY
        }

        record_result() {
          local outdir="$1" service="$2" status="$3" value="$4"
          printf '%s\n%s\n' "$status" "$value" > "$outdir/${service}.result"
        }

        upload_pixeldrain() {
          local file="$1" outdir="$2" base encoded tmp err id
          base="$(basename "$file")"
          if [[ -z "${PIXELDRAIN_API_KEY:-}" ]]; then
            record_result "$outdir" pixeldrain skipped "PIXELDRAIN_API_KEY/PIXELDRAIN_TOKEN is not set"
            return 0
          fi
          encoded="$(url_encode "$base")"
          tmp="$(mktemp)"; err="$(mktemp)"
          if ! curl -fsS --retry 2 --retry-delay 5 -T "$file" -u ":$PIXELDRAIN_API_KEY" \
              "https://pixeldrain.com/api/file/$encoded" -o "$tmp" 2>"$err"; then
            record_result "$outdir" pixeldrain failed "$(tr '\n' ' ' < "$err" | cut -c1-300)"
            return 0
          fi
          id="$(json_first "$tmp" id data.id 2>/dev/null || true)"
          if [[ -z "$id" ]]; then
            record_result "$outdir" pixeldrain failed "No file id in response: $(tr '\n' ' ' < "$tmp" | cut -c1-300)"
            return 0
          fi
          record_result "$outdir" pixeldrain ok "https://pixeldrain.com/u/$id"
        }

        upload_gofile() {
          local file="$1" outdir="$2" tmp err status url code
          tmp="$(mktemp)"; err="$(mktemp)"
          local args=(curl -fsS --retry 2 --retry-delay 5 -X POST "https://upload.gofile.io/uploadfile" -F "file=@${file}")
          if [[ -n "${GOFILE_TOKEN:-}" ]]; then
            args+=(-H "Authorization: Bearer ${GOFILE_TOKEN}")
          fi
          if [[ -n "${GOFILE_FOLDER_ID:-}" ]]; then
            args+=(-F "folderId=${GOFILE_FOLDER_ID}")
          fi
          if ! "${args[@]}" -o "$tmp" 2>"$err"; then
            record_result "$outdir" gofile failed "$(tr '\n' ' ' < "$err" | cut -c1-300)"
            return 0
          fi
          status="$(json_first "$tmp" status 2>/dev/null || true)"
          if [[ "$status" != "ok" ]]; then
            record_result "$outdir" gofile failed "Unexpected response: $(tr '\n' ' ' < "$tmp" | cut -c1-300)"
            return 0
          fi
          url="$(json_first "$tmp" data.downloadPage data.downloadPageUrl data.link data.url data.directLink 2>/dev/null || true)"
          if [[ -z "$url" ]]; then
            code="$(json_first "$tmp" data.code data.fileId data.folderId 2>/dev/null || true)"
            [[ -n "$code" ]] && url="https://gofile.io/d/$code"
          fi
          if [[ -z "$url" ]]; then
            record_result "$outdir" gofile failed "No public URL in response: $(tr '\n' ' ' < "$tmp" | cut -c1-300)"
            return 0
          fi
          record_result "$outdir" gofile ok "$url"
        }

        upload_vikingfile() {
          local file="$1" outdir="$2" base size tmp err upload_id key part_size number_parts idx url offset len hdr etag complete
          base="$(basename "$file")"
          size="$(stat -c '%s' "$file")"
          tmp="$(mktemp)"; err="$(mktemp)"

          if ! curl -fsS --retry 2 --retry-delay 5 -X POST "https://vikingfile.com/api/get-upload-url" \
              --data-urlencode "size=$size" -o "$tmp" 2>"$err"; then
            record_result "$outdir" vikingfile failed "$(tr '\n' ' ' < "$err" | cut -c1-300)"
            return 0
          fi

          upload_id="$(json_first "$tmp" uploadId 2>/dev/null || true)"
          key="$(json_first "$tmp" key 2>/dev/null || true)"
          part_size="$(json_first "$tmp" partSize 2>/dev/null || true)"
          number_parts="$(json_first "$tmp" numberParts 2>/dev/null || true)"
          if [[ -z "$upload_id" || -z "$key" || -z "$part_size" || -z "$number_parts" ]]; then
            record_result "$outdir" vikingfile failed "Invalid get-upload-url response: $(tr '\n' ' ' < "$tmp" | cut -c1-300)"
            return 0
          fi

          local -a complete_args
          complete_args=(curl -fsS --retry 2 --retry-delay 5 -X POST "https://vikingfile.com/api/complete-upload"
            --data-urlencode "key=$key"
            --data-urlencode "uploadId=$upload_id"
            --data-urlencode "name=$base"
            --data-urlencode "user=${VIKINGFILE_USER_HASH:-}")
          [[ -n "${VIKINGFILE_PATH:-}" ]] && complete_args+=(--data-urlencode "path=${VIKINGFILE_PATH}")
          [[ -n "${VIKINGFILE_PUBLIC_SHARE:-}" ]] && complete_args+=(--data-urlencode "pathPublicShare=${VIKINGFILE_PUBLIC_SHARE}")

          for ((idx=0; idx<number_parts; idx++)); do
            url="$(json_get "$tmp" "urls.$idx" 2>/dev/null || true)"
            if [[ -z "$url" ]]; then
              record_result "$outdir" vikingfile failed "Missing upload URL for part $((idx + 1))"
              return 0
            fi
            offset=$((idx * part_size))
            len="$part_size"
            if (( offset + len > size )); then
              len=$((size - offset))
            fi
            hdr="$(mktemp)"; err="$(mktemp)"
            if ! dd if="$file" bs=1M skip="$offset" count="$len" iflag=skip_bytes,count_bytes status=none \
                | curl -fsS --retry 2 --retry-delay 5 -X PUT --data-binary @- -D "$hdr" "$url" -o /dev/null 2>"$err"; then
              record_result "$outdir" vikingfile failed "Part $((idx + 1)) failed: $(tr '\n' ' ' < "$err" | cut -c1-300)"
              return 0
            fi
            etag="$(awk 'BEGIN{IGNORECASE=1} /^etag:/ {gsub("\r", ""); sub(/^[Ee][Tt][Aa][Gg]:[[:space:]]*/, ""); gsub(/\"/, ""); print; exit}' "$hdr")"
            if [[ -z "$etag" ]]; then
              record_result "$outdir" vikingfile failed "No ETag returned for part $((idx + 1))"
              return 0
            fi
            complete_args+=(--data-urlencode "parts[$idx][PartNumber]=$((idx + 1))")
            complete_args+=(--data-urlencode "parts[$idx][ETag]=$etag")
          done

          complete="$(mktemp)"; err="$(mktemp)"
          if ! "${complete_args[@]}" -o "$complete" 2>"$err"; then
            record_result "$outdir" vikingfile failed "$(tr '\n' ' ' < "$err" | cut -c1-300)"
            return 0
          fi
          url="$(json_first "$complete" url 2>/dev/null || true)"
          if [[ -z "$url" ]]; then
            record_result "$outdir" vikingfile failed "No public URL in response: $(tr '\n' ' ' < "$complete" | cut -c1-300)"
            return 0
          fi
          record_result "$outdir" vikingfile ok "$url"
        }

        find_artifacts() {
          python3 - "$DEVICE_NAME" "$MIRROR_ARTIFACT_LIMIT" <<'PY'
        import sys
        from pathlib import Path
        device = sys.argv[1]
        try:
            limit = max(1, int(sys.argv[2] or '1'))
        except Exception:
            limit = 1
        roots = [Path('out/target/product') / device, Path('out')]
        files = []
        for root in roots:
            if not root.exists():
                continue
            for pattern in ('*.zip', '*.img'):
                for p in root.rglob(pattern):
                    if not p.is_file():
                        continue
                    path = str(p)
                    if '/obj/' in path or '/intermediates/' in path:
                        continue
                    try:
                        st = p.stat()
                    except OSError:
                        continue
                    score = 0 if p.suffix == '.zip' else 1
                    files.append((score, -st.st_mtime, path))
            if files:
                break
        seen = set()
        selected = []
        for _, _, path in sorted(files):
            if path not in seen:
                seen.add(path)
                selected.append(path)
            if len(selected) >= limit:
                break
        for path in selected:
            print(path)
        PY
        }

        send_telegram_upload_complete() {
          local file="$1" outdir="$2"
          if [[ -z "${TELEGRAM_TOKEN:-}" || -z "${TELEGRAM_TO:-}" ]]; then
            log "Telegram secrets are not set; skipping upload-complete message."
            return 0
          fi

          python3 - "$file" "$outdir" "$TELEGRAM_TO" <<'PY' > "$outdir/telegram_payload.json"
        import datetime as dt
        import hashlib
        import html
        import json
        import mimetypes
        import subprocess
        import sys
        from pathlib import Path

        file_path = Path(sys.argv[1])
        outdir = Path(sys.argv[2])
        chat_id = sys.argv[3]

        services = [
            ("pixeldrain", "Pixeldrain"),
            ("gofile", "GoFile"),
            ("vikingfile", "Vikingfile"),
        ]

        def read_result(slug):
            result = outdir / f"{slug}.result"
            if not result.exists():
                return "failed", "No result produced"
            lines = result.read_text(errors="replace").splitlines()
            status = lines[0] if lines else "failed"
            value = "\n".join(lines[1:]).strip() if len(lines) > 1 else ""
            return status, value

        def sha256sum(path):
            h = hashlib.sha256()
            with path.open("rb") as fh:
                for chunk in iter(lambda: fh.read(1024 * 1024), b""):
                    h.update(chunk)
            return h.hexdigest()

        size = file_path.stat().st_size
        size_human = f"{size / 1000**3:.2f} GB" if size >= 1000**3 else (
            f"{size / 1000**2:.2f} MB" if size >= 1000**2 else f"{size} bytes"
        )
        mime = mimetypes.guess_type(str(file_path))[0]
        if not mime:
            try:
                mime = subprocess.check_output(["file", "--mime-type", "-b", str(file_path)], text=True).strip()
            except Exception:
                mime = "application/octet-stream"
        uploaded = dt.datetime.now().strftime("%Y-%m-%d %H:%M:%S WIB (UTC+7)")
        digest = sha256sum(file_path)

        statuses = []
        buttons = []
        for slug, label in services:
            status, value = read_result(slug)
            if status == "ok" and value.startswith("http"):
                statuses.append(f"{label}: OK")
                buttons.append([{"text": f"⬇️ {label}", "url": value}])
            elif status == "skipped":
                statuses.append(f"{label}: SKIPPED - {value}")
            else:
                statuses.append(f"{label}: FAILED - {value}")

        e = html.escape
        meta = "\n".join([
            f"File: {file_path.name}",
            f"Type: {mime}",
            f"Size: {size_human} ({size} bytes)",
            f"SHA256: {digest}",
            f"Uploaded: {uploaded}",
        ])
        message = (
            "<b>✅ Upload Complete</b>\n\n"
            f"<blockquote expandable>{e(meta)}</blockquote>\n\n"
            f"<pre>{e(chr(10).join(statuses))}</pre>"
        )
        payload = {
            "chat_id": chat_id,
            "text": message,
            "parse_mode": "HTML",
            "disable_web_page_preview": True,
        }
        if buttons:
            payload["reply_markup"] = {"inline_keyboard": buttons}
        print(json.dumps(payload, separators=(",", ":")))
        PY

          curl -fsS --retry 2 --retry-delay 5 \
            -H "Content-Type: application/json" \
            -X POST "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
            -d "@$outdir/telegram_payload.json" >/dev/null || true
        }

        upload_artifact_to_mirrors() {
          local file="$1" outdir pids=()
          outdir="$(mktemp -d)"
          log "Uploading $(basename "$file") to Pixeldrain, GoFile, and Vikingfile in parallel"

          upload_pixeldrain "$file" "$outdir" & pids+=("$!")
          upload_gofile "$file" "$outdir" & pids+=("$!")
          upload_vikingfile "$file" "$outdir" & pids+=("$!")

          local pid
          for pid in "${pids[@]}"; do
            wait "$pid" || true
          done

          log "Upload results for $(basename "$file"):"
          for result in "$outdir"/*.result; do
            [[ -e "$result" ]] || continue
            printf '%s: ' "$(basename "$result" .result)" >&2
            paste -sd ' | ' "$result" >&2 || true
          done
          send_telegram_upload_complete "$file" "$outdir"
        }

        mapfile -t ARTIFACTS < <(find_artifacts)
        if (( ${#ARTIFACTS[@]} == 0 )); then
          log "No .zip or .img artifacts found under out/target/product/$DEVICE_NAME or out/."
          exit 0
        fi

        for artifact in "${ARTIFACTS[@]}"; do
          upload_artifact_to_mirrors "$artifact"
        done
        EOF
        sed -i 's/^        //' mirror-upload.sh
        chmod +x mirror-upload.sh

        crave push mirror-upload.env -d "$REMOTE_DIR/"
        crave push mirror-upload.sh -d "$REMOTE_DIR/"
        crave ssh -- "set +x; . ./mirror-upload.env; bash ./mirror-upload.sh '${{ github.event.inputs.DEVICE_NAME }}' '${{ github.repository }}' '${{ github.run_id }}'"

      # Pull Errors and Display them
    - name: Display error.log
      if: ${{ failure() }}
      id: errorlog
      run: |
        cd $PROJECTFOLDER
        crave ssh -- sleep 1
        crave pull out/error.log
        echo "Displaying out/error.log"
        cat out/error.log

      # Upload to Telegram
    - name: Upload Using telegram-upload
      run: |
        cd $PROJECTFOLDER
        crave ssh -- "export TG_UPLOAD_LIMIT="${{ secrets.TG_UPLOAD_LIMIT }}"; bash /opt/crave/telegram/upload.sh '${{ github.event.inputs.DEVICE_NAME }}' '${{ secrets.EXTRA_FILES }}'"
      continue-on-error: true

      # Remove 'crave' clone
    - name: Destroy Crave Clone
      if: ${{ always() }}
      run: |
        if grep -q "$PROJECTFOLDER" <(crave clone list --json | jq -r '.clones[]."Cloned At"') || [[ "${DCDEVSPACE}" == "1" ]]; then
          crave clone destroy -y $PROJECTFOLDER || echo "Error removing $PROJECTFOLDER"
        else          
          echo "Skipping removal"
        fi
